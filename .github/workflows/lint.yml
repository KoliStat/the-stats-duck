name: Checks

on:
  push:
    branches: [main, "v0.*"]
  pull_request:

jobs:
  wasm-string-hash-guard:
    name: WASM std::string-hash guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # No submodules needed — this only greps src/.
      - name: No default-hash std::string-keyed unordered containers (WASM ABI guard)
        run: bash scripts/check-wasm-string-hash.sh

  linalg-cpp-tests:
    name: linalg C++ unit tests (Epic 0.1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Only the Eigen submodule is needed (linalg is DuckDB-free); skip the
      # huge duckdb submodule.
      - name: Check out Eigen
        run: git submodule update --init --depth 1 third_party/eigen
      - name: Build + run linalg tests
        run: bash scripts/run-linalg-tests.sh
